# MLE-bench Evaluation - Test Code Mode
# submit_file=code, evaluator runs train.py

defaults:
  - base

# Model settings (Azure OpenAI)
model:
  name: gpt-5
  azure_endpoint: https://azure-services-fair-openai1-eastus2n3.azure-api.net
  api_key: ${oc.env:AZURE_API_KEY,73afb4e502de426c8ea645416de6ec0b}
  api_version: 2025-03-01-preview
  reasoning_effort: high    # none, minimal, low, medium, high, xhigh

# Agent settings - Code mode
agent:
  submit_file: code          # Evaluator runs train.py
  session_timeout: 1200      # 20 minutes per bash command
  eval_timeout: 86400        # 24 hours for train.py execution

# Sandbox settings
sandbox:
  manager_uri:  h200-137-001-093:36689

# Production eval settings
eval:
  samples_per_prompt: 64
  output_dir: /checkpoint/maui_sft/winnieyangwn/RLLM/test_code
  tasks: mlsp-2013-birds,spooky-author-identification,whale-categorization-playground,h-and-m-personalized-fashion-recommendations # tasks: task1,task2,task3           # Or multiple tasks (comma-separated)
