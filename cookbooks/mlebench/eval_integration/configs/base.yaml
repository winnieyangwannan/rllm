# MLE-bench Evaluation - Base Config
# This file contains shared defaults. Override in model-specific configs.

# Agent settings
agent:
  max_turns: 256
  session_timeout: 32400      # 12 hours each turn
  rollout_timeout: 86400     # 24 hours total
  eval_timeout: 32400        # 9 hours for train.py execution (only used when submit_file=code)
  context_size: 480000
  temperature: 1.0
  submit_file: csv           # 'csv' or 'code'
  check_submission_validity: true

# Sandbox/container settings
sandbox:
  manager_uri:  h200-137-001-093:36689
  superimage_directory: /checkpoint/maui_sft/shared/sif
  superimage_version: 2025-05-02v2
  superimage_overlay: /checkpoint/fair-maui-hs/hotfix/kniu.2025-09-19.cache.overlay.ext3.img

# Data paths
data:
  mle_bench_data_dir: /checkpoint/maui/shared/cache/dojo/tasks/mlebench
  task_path: /checkpoint/maui_sft/winnieyangwn/datasets/mlebench_full.jsonl  # JSONL file with all tasks

# Evaluation settings
eval:
  samples_per_prompt: 2      # Default for testing, override for production
  max_workers: null          # Max parallel rollouts (null = same as samples_per_prompt)
  output_dir: /checkpoint/maui_sft/winnieyangwn/RLLM
  parallel: true             # Run rollouts in parallel

# SLURM settings (used by launch.py)
slurm:
  partition: h200            # SLURM partition
  qos: h200_coding_shared
  account: aira_ws2
  time: "168:00:00"          # 7 days default
  nodes: 1
  gpus_per_node: 1           # GPUs per node (H200 nodes have 8)
  cpus_per_node: 192         # H200 nodes have 192 CPUs

# Ray settings (used by eval_ray.py)
ray:
  max_concurrent_tasks: 64   # Max parallel rollouts per node (primary parallelism control)
