# Replicate CSV mode (multi_node_2_tasks)
# submit_file=csv (default from base)

defaults:
  - base

# Model settings (Azure OpenAI)
model:
  name: gpt-5
  azure_endpoint: https://azure-services-fair-openai1-eastus2n3.azure-api.net
  api_key: ${oc.env:AZURE_API_KEY,73afb4e502de426c8ea645416de6ec0b}
  api_version: 2025-03-01-preview
  reasoning_effort: high

# Agent settings - CSV mode (same as original gpt5.yaml)
# submit_file: csv is inherited from base.yaml
# session_timeout: 32400 is inherited from base.yaml
# eval_timeout: 32400 is inherited from base.yaml

# Sandbox settings
sandbox:
  manager_uri: h200-137-001-039:44571

# Evaluation settings
eval:
  samples_per_prompt: 64
  output_dir: /checkpoint/maui_sft/winnieyangwn/rllm/replicate_csv

# SLURM settings
slurm:
  qos: h200_agentic-models_high
  account: agentic-models
