# Qwen3.5-27B via vLLM - CODE mode
# Uses RolloutClient in text mode against external vLLM server
#
# Prerequisites:
#   vLLM server must be running at base_url with tool calling enabled
#
# Launch:
#   cd /home/winnieyangwn/rllm/examples/mlebench
#   python launch.py --config configs/qwen27b_vllm_code_hard.yaml --name qwen27b_vllm_code_hard --tasks  chaii-hindi-and-tamil-question-answering,ranzcr-clip-catheter-line-classification,new-york-city-taxi-fare-prediction  --samples 128 --nodes 3

defaults:
  - base

# Model settings (vLLM server - external)
model:
  name: Qwen/Qwen3.5-27B
  backend: vllm
  base_url:  http://h200-137-000-153:32885

# Agent settings - Code mode (same timeouts as replicate_code.yaml)
agent:
  submit_file: code
  session_timeout: 1200      # 20 minutes per bash command
  eval_timeout: 86400        # 24 hours for train.py execution
  context_size: 262144       # Qwen3.5-27B has 262K context!
  temperature: 1.0
  llm_timeout: 900.0         # 15 min timeout per LLM call

# Sandbox settings
sandbox:
  manager_uri:  h200-137-000-153:34323

# Evaluation settings
eval:
  samples_per_prompt: 128
  output_dir: /checkpoint/maui_sft/winnieyangwn/rllm/eval/qwen27b_vllm_code

# SLURM settings
slurm:
  qos: h200_aira_ws1_high #h200_agentic-models_high
  account: aira_ws1 #agentic-models
  gpus_per_node: 1

# Ray settings
ray:
  max_concurrent_tasks_per_node: 64
