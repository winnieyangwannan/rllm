# MLE-bench Evaluation - Comparison Test Config
# For Phase 3 side-by-side validation (legacy vs new agent loop)

defaults:
  - base

# Model settings (Azure OpenAI)
model:
  name: gpt-5
  azure_endpoint: https://azure-services-fair-openai1-eastus2n3.azure-api.net
  api_key: ${oc.env:AZURE_API_KEY,73afb4e502de426c8ea645416de6ec0b}
  api_version: 2025-03-01-preview

# Test settings (1 sample for quick comparison)
eval:
  samples_per_prompt: 64
  output_dir: /checkpoint/maui_sft/winnieyangwn/rllm/comparison_test

# SLURM settings (1 GPU for testing)
slurm:
  gpus_per_node: 1
  nodes: 1
  time: "4:00:00"  # 4 hours should be enough for 1 sample
