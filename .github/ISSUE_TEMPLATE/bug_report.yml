name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: Describe the bug clearly...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Run `python -m rllm.trainer.verl.train_agent_ppo ...`
        2. Wait for step N
        3. See error
    validations:
      required: true

  - type: textarea
    id: error-output
    attributes:
      label: Error Output / Traceback
      description: Paste the full error output or traceback.
      render: shell
    validations:
      required: false

  - type: input
    id: rllm-version
    attributes:
      label: rLLM Version
      description: Output of `pip show rllm` or the commit hash you're using.
      placeholder: e.g., 0.2.1 or commit abc1234
    validations:
      required: true

  - type: dropdown
    id: backend
    attributes:
      label: Training Backend
      options:
        - verl
        - tinker
        - N/A
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      placeholder: e.g., 3.11.5
    validations:
      required: true

  - type: input
    id: gpu-cuda
    attributes:
      label: GPU / CUDA Version
      placeholder: e.g., A100 80GB / CUDA 12.1
    validations:
      required: false

  - type: input
    id: vllm-version
    attributes:
      label: vLLM Version (if applicable)
      placeholder: e.g., 0.8.5
    validations:
      required: false

  - type: textarea
    id: training-config
    attributes:
      label: Training Script / Config
      description: Paste relevant parts of your training script or Hydra config.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other information (screenshots, training curves, related issues, etc.).
    validations:
      required: false
